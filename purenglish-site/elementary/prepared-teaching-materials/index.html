<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prepared Teaching Materials — PurEnglish</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .page-content { max-width: 860px; margin: 2.5rem auto; padding: 0 1.5rem 3rem; }
    .page-content h1, .page-content h2 { color: #1B3A6B; }
    .page-content h2 { margin-top: 1.75rem; }
    .page-content a { color: #2E7DBF; }
    .page-content ul { margin-left: 1.5rem; line-height: 2; }
    .page-loading { color: #888; font-style: italic; }
  </style>
</head>
<body>

  <div id="site-header"></div>

  <main>
    <div class="page-content">
      <p class="page-loading" id="content-body">Loading…</p>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function () {
      var parts = location.pathname.replace(/\/$/, '').split('/').filter(Boolean);
      var mdPath = parts.length === 1
        ? '/content/' + parts[0] + '/index.md'
        : '/content/' + parts.join('/') + '.md';

      fetch(mdPath)
        .then(function (r) { if (!r.ok) throw new Error(); return r.text(); })
        .then(function (text) {
          var body = text.replace(/^---[\s\S]*?---\n/, '');
          document.getElementById('content-body').outerHTML = '<div id="content-body">' + marked.parse(body) + '</div>';
          var h1 = document.querySelector('#content-body h1');
          if (h1) document.title = h1.textContent + ' — PurEnglish';
        })
        .catch(function () {
          document.getElementById('content-body').textContent = 'Content coming soon.';
        });
    })();
  </script>

  <script src="/js/components.js"></script>
</body>
</html>
